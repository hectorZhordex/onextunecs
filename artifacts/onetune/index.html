<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>OneTune – Stream Music, Discover Songs &amp; Create Playlists</title>
    <meta name="description" content="OneTune is a modern music streaming platform where you can discover new songs, explore artists, create playlists, and enjoy music anytime, anywhere. Stream your favorite tracks with a fast, beautiful, and user-friendly experience." />
    <meta name="keywords" content="OneTune, music streaming, online music player, stream songs, music app, playlists, artists, albums, audio streaming, music discovery, trending songs, online music platform, listen to music online, music library, music search, music community" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="OneTune" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OneTune – Your Music, Your Vibe" />
    <meta property="og:description" content="Discover, stream, and enjoy music with OneTune. Explore artists, albums, playlists, and trending tracks on a modern music streaming platform." />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:site_name" content="OneTune" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OneTune – Your Music, Your Vibe" />
    <meta name="twitter:description" content="Listen to your favorite music, discover new artists, and create playlists with OneTune." />
    <meta name="twitter:image" content="/favicon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Web App Manifest (PWA) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff006b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OneTune" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
